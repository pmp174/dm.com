<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gallery – pmp174</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --glass-bg:     rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.18);
            --inset-hi:     inset 0 1px 0 rgba(255,255,255,0.22);
            --shadow:       0 8px 32px rgba(0,0,0,0.35);
        }

        html, body { min-height: 100vh; overflow-x: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('background.jpg') center/cover no-repeat fixed;
            color: #fff;
            padding: 2.5rem 1.5rem 5rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0,0,20,0.28);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 2.2rem;
            animation: fadeUp .55s cubic-bezier(.23,1,.32,1) both;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .48rem 1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: rgba(255,255,255,.88);
            text-decoration: none;
            font-size: .8rem;
            font-weight: 500;
            letter-spacing: .025em;
            box-shadow: var(--inset-hi), 0 4px 14px rgba(0,0,0,.22);
            transition: all .35s cubic-bezier(.34,1.56,.64,1);
            white-space: nowrap;
        }

        .back-btn svg { width: 14px; height: 14px; }

        .back-btn:hover {
            background: rgba(255,255,255,.13);
            transform: translateX(-3px) scale(1.03);
            box-shadow: var(--inset-hi), 0 8px 22px rgba(0,0,0,.28);
        }

        .page-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.7rem;
            text-shadow: 0 2px 12px rgba(0,0,0,.4);
        }

        /* ── Projects grid ── */
        #projectsView {
            animation: fadeUp .55s .08s cubic-bezier(.23,1,.32,1) both;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .project-card {
            position: relative;
            aspect-ratio: 4/3;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: var(--inset-hi), var(--shadow);
            cursor: pointer;
            text-decoration: none;
            background: rgba(255,255,255,.04);
            transition: transform .4s cubic-bezier(.34,1.56,.64,1),
                        box-shadow .4s cubic-bezier(.23,1,.32,1);
        }

        .project-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--inset-hi), 0 20px 48px rgba(0,0,0,.5);
        }

        .project-card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform .5s cubic-bezier(.23,1,.32,1);
        }

        .project-card:hover .project-card-bg { transform: scale(1.07); }

        .project-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 55%);
            display: flex;
            align-items: flex-end;
            padding: 1rem 1.1rem;
        }

        .project-card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            text-shadow: 0 1px 8px rgba(0,0,0,.6);
        }

        /* ── Project photo view ── */
        #projectView {
            display: none;
            animation: fadeUp .45s cubic-bezier(.23,1,.32,1) both;
        }

        #projectView.active { display: block; }

        .project-header {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            margin-bottom: 1.6rem;
        }

        .project-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            text-shadow: 0 2px 10px rgba(0,0,0,.4);
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: .85rem;
        }

        .photo-item {
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: var(--inset-hi), 0 4px 16px rgba(0,0,0,.25);
            cursor: pointer;
            background: rgba(255,255,255,.04);
            transition: transform .35s cubic-bezier(.34,1.56,.64,1),
                        box-shadow .35s cubic-bezier(.23,1,.32,1);
        }

        .photo-item:hover {
            transform: scale(1.04);
            box-shadow: var(--inset-hi), 0 10px 28px rgba(0,0,0,.4);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .45s cubic-bezier(.23,1,.32,1);
        }

        .photo-item:hover img { transform: scale(1.06); }

        /* loading / empty state */
        .state-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 2rem;
            color: rgba(255,255,255,.55);
            font-size: .92rem;
        }

        /* ── Lightbox ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active { display: flex; }

        .lightbox-img {
            max-width: 90vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 24px 64px rgba(0,0,0,.6);
        }

        .lb-btn {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,.1);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            transition: background .25s, transform .25s;
            z-index: 9001;
        }

        .lb-btn:hover { background: rgba(255,255,255,.2); transform: scale(1.1); }
        .lb-btn svg { width: 20px; height: 20px; }

        .lb-close { top: 1.25rem; right: 1.25rem; }
        .lb-prev  { left: 1.25rem; top: 50%; transform: translateY(-50%); }
        .lb-next  { right: 1.25rem; top: 50%; transform: translateY(-50%); }
        .lb-prev:hover { transform: translateY(-50%) scale(1.1); }
        .lb-next:hover { transform: translateY(-50%) scale(1.1); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Mobile ── */
        @media (max-width: 500px) {
            body { padding: 2rem 1rem 4rem; }
            .projects-grid { grid-template-columns: 1fr 1fr; gap: .65rem; }
            .photos-grid   { grid-template-columns: 1fr 1fr; gap: .65rem; }
            .page-title, .project-name { font-size: 1.35rem; }
            .lb-prev { left: .5rem; }
            .lb-next { right: .5rem; }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Top bar -->
    <div class="topbar">
        <a href="index.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Home
        </a>
        <h1 class="page-title">Gallery</h1>
    </div>

    <!-- Projects grid view -->
    <div id="projectsView">
        <div class="projects-grid" id="projectsGrid">
            <p class="state-msg">Loading projects…</p>
        </div>
    </div>

    <!-- Individual project view -->
    <div id="projectView">
        <div class="project-header">
            <button class="back-btn" id="backToProjects">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                All Projects
            </button>
            <h2 class="project-name" id="projectName"></h2>
        </div>
        <div class="photos-grid" id="photosGrid"></div>
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lb-btn lb-close" id="lbClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button class="lb-btn lb-prev" id="lbPrev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="lb-btn lb-next" id="lbNext">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <img class="lightbox-img" id="lbImg" src="" alt="">
</div>

<script>
    // ─── Config ───────────────────────────────────────────────────────────────
    // If your site lives at a sub-path (e.g. GitHub Pages: /repo-name), set it here.
    // Otherwise leave as ''.
    const BASE = '';

    // ─── State ────────────────────────────────────────────────────────────────
    let projects    = [];
    let photos      = [];   // sorted array of { index, src }
    let lbIndex     = 0;

    // ─── Boot ─────────────────────────────────────────────────────────────────
    (async () => {
        try {
            const res  = await fetch(`${BASE}/gallery/gallery.json`);
            const data = await res.json();
            projects   = data.projects || [];
        } catch (e) {
            projects = [];
        }
        renderProjects();
    })();

    // ─── Render project cards ─────────────────────────────────────────────────
    function renderProjects() {
        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = '';

        if (!projects.length) {
            grid.innerHTML = '<p class="state-msg">No projects found. Add folder names to gallery/gallery.json.</p>';
            return;
        }

        projects.forEach(name => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `
                <div class="project-card-bg"></div>
                <div class="project-card-overlay">
                    <span class="project-card-title">${name}</span>
                </div>`;

            // Try to load cover image
            const bg   = card.querySelector('.project-card-bg');
            const exts = ['jpg','jpeg','png','gif','webp'];
            tryLoad(`${BASE}/gallery/${encodeURIComponent(name)}/1`, exts, src => {
                bg.style.backgroundImage = `url('${src}')`;
            });

            card.addEventListener('click', () => openProject(name));
            grid.appendChild(card);
        });
    }

    // ─── Open a project ───────────────────────────────────────────────────────
    function openProject(name) {
        document.getElementById('projectsView').style.display = 'none';
        const pv = document.getElementById('projectView');
        pv.classList.add('active');
        document.getElementById('projectName').textContent = name;

        const grid = document.getElementById('photosGrid');
        grid.innerHTML = '<p class="state-msg">Loading images…</p>';
        photos = [];

        const exts    = ['jpg','jpeg','png','gif','webp'];
        const maxNum  = 100;
        let   pending = maxNum;
        let   started = false;

        for (let i = 1; i <= maxNum; i++) {
            const idx = i;
            tryLoad(`${BASE}/gallery/${encodeURIComponent(name)}/${idx}`, exts, src => {
                photos.push({ index: idx, src });
                photos.sort((a, b) => a.index - b.index);

                if (!started) {
                    started = true;
                    grid.innerHTML = '';
                }

                const item = document.createElement('div');
                item.className   = 'photo-item';
                item.style.order = idx;
                item.innerHTML   = `<img src="${src}" alt="${name} ${idx}">`;
                item.addEventListener('click', () => openLightbox(photos.findIndex(p => p.index === idx)));
                grid.appendChild(item);

                pending--;
                if (!pending && !photos.length) {
                    grid.innerHTML = '<p class="state-msg">No images found. Make sure they are named 1.jpg, 2.jpg, etc.</p>';
                }
            }, () => {
                pending--;
            });
        }
    }

    // ─── Lightbox ─────────────────────────────────────────────────────────────
    function openLightbox(idx) {
        lbIndex = idx;
        document.getElementById('lbImg').src = photos[lbIndex].src;
        document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

    function lbStep(dir) {
        lbIndex = (lbIndex + dir + photos.length) % photos.length;
        document.getElementById('lbImg').src = photos[lbIndex].src;
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => lbStep(-1));
    document.getElementById('lbNext').addEventListener('click', () => lbStep(1));
    document.getElementById('lightbox').addEventListener('click', e => { if (e.target.id === 'lightbox') closeLightbox(); });

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape')      closeLightbox();
        if (e.key === 'ArrowLeft')   lbStep(-1);
        if (e.key === 'ArrowRight')  lbStep(1);
    });

    // ─── Back button ──────────────────────────────────────────────────────────
    document.getElementById('backToProjects').addEventListener('click', () => {
        document.getElementById('projectView').classList.remove('active');
        document.getElementById('projectsView').style.display = '';
    });

    // ─── Helper: try extensions in order ─────────────────────────────────────
    function tryLoad(basePath, exts, onSuccess, onFail) {
        let tried = 0;
        let found = false;

        exts.forEach(ext => {
            if (found) return;
            const img = new Image();
            img.onload = () => {
                if (!found) { found = true; onSuccess(img.src); }
            };
            img.onerror = () => {
                tried++;
                if (tried === exts.length && !found && onFail) onFail();
            };
            img.src = `${basePath}.${ext}`;
        });
    }
</script>
</body>
</html>
