<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>pmp174</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        html, body {
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('images/background.jpg') center/cover no-repeat fixed;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem 5rem;
        }

        /* Subtle overlay for readability */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 15, 0.25);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeUp 0.7s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid var(--glass-border);
            box-shadow: var(--glass-shadow-inset), 0 8px 32px rgba(0,0,0,0.45);
            margin-bottom: 1.1rem;
        }

        .name {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            letter-spacing: 0.01em;
            line-height: 1;
            margin-bottom: 0.3rem;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .handle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.06em;
            text-transform: lowercase;
            margin-bottom: 0.8rem;
        }

        .bio {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.75);
            text-align: center;
            max-width: 380px;
            line-height: 1.6;
        }

        /* ── SOCIAL LINKS ── */
        .social-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.4rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.7s 0.1s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.5rem 1.1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            box-shadow: var(--glass-shadow-inset), 0 4px 16px rgba(0,0,0,0.2);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .social-link svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            opacity: 0.85;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.32);
            transform: translateY(-3px) scale(1.04);
            box-shadow: var(--glass-shadow-inset), 0 8px 24px rgba(0,0,0,0.3);
        }

        .social-link:active {
            transform: translateY(-1px) scale(1.01);
        }

        /* ── DIVIDER ── */
        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1.2rem;
            align-self: flex-start;
            animation: fadeUp 0.7s 0.2s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        /* ── PORTFOLIO GRID ── */
        .portfolio-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.85rem;
            animation: fadeUp 0.7s 0.25s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        .portfolio-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/3;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow-inset), var(--glass-shadow);
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
        }

        /* First card spans full width */
        .portfolio-card.featured {
            grid-column: 1 / -1;
            aspect-ratio: 16/7;
        }

        .portfolio-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--glass-shadow-inset), 0 20px 50px rgba(0,0,0,0.5);
        }

        .portfolio-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: block;
        }

        .portfolio-card:hover img {
            transform: scale(1.06);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem 1.1rem;
        }

        .card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.05rem;
            line-height: 1.2;
            margin-bottom: 0.2rem;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }

        .featured .card-title {
            font-size: 1.35rem;
        }

        .card-sub {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.04em;
        }

        /* Placeholder cards (no image) */
        .portfolio-card.placeholder {
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placeholder-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.35;
        }

        .placeholder-inner svg {
            width: 28px;
            height: 28px;
        }

        .placeholder-inner span {
            font-size: 0.75rem;
            letter-spacing: 0.06em;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            body {
                padding: 2.5rem 1rem 4rem;
            }

            .portfolio-grid {
                grid-template-columns: 1fr;
            }

            .portfolio-card.featured {
                aspect-ratio: 16/9;
            }

            .portfolio-card {
                aspect-ratio: 4/3;
            }

            .name {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- Header -->
    <header class="header">
        <img src="images/profile.jpeg" alt="Darby" class="profile-pic">
        <h1 class="name">Darby</h1>
        <p class="handle">pmp174</p>
        <p class="bio">Welcome to my humble corner of the web — a documentation of things I've made and places I've been.</p>

        <!-- Social Links -->
        <div class="social-row">
            <a href="https://www.youtube.com/" target="_blank" rel="noopener" class="social-link">
                <!-- YouTube -->
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 9.71a8.5 8.5 0 00-.91-4.13 2.92 2.92 0 00-1.72-1A78.36 78.36 0 0012 4.27a78.45 78.45 0 00-8.34.3 2.87 2.87 0 00-1.46.74c-.9.83-1 2.25-1.1 3.45a48.29 48.29 0 000 6.48 9.55 9.55 0 00.3 2 3.14 3.14 0 00.71 1.36 2.86 2.86 0 001.49.78 45.18 45.18 0 006.5.33c3.5.05 6.57 0 10.2-.28a2.88 2.88 0 001.53-.78 2.49 2.49 0 00.61-1 10.58 10.58 0 00.52-3.4c.04-.56.04-3.94.04-4.54zM9.74 14.85V8.66l5.92 3.11c-1.66.92-3.85 1.96-5.92 3.08z"/></svg>
                YouTube
            </a>
            <a href="https://bsky.app/profile/your-handle.bsky.social" target="_blank" rel="noopener" class="social-link">
                <!-- Bluesky -->
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 01-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.206-.659-.298-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/></svg>
                Bluesky
            </a>
            <a href="mailto:you@example.com" class="social-link">
                <!-- Email -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
                Email
            </a>
            <a href="gallery.html" class="social-link">
                <!-- Gallery -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                Gallery
            </a>
        </div>
    </header>

    <!-- Portfolio Section -->
    <p class="section-label">Portfolio</p>

    <div class="portfolio-grid">

        <!-- Featured project -->
        <a href="gallery.html" class="portfolio-card featured">
            <img src="gallery/Latin Union-União Latina/1.jpg" alt="Latin Union" onerror="this.style.display='none'">
            <div class="card-overlay">
                <span class="card-title">Latin Union</span>
                <span class="card-sub">Photography · 2025</span>
            </div>
        </a>

        <!-- Placeholder cards — swap src with real images -->
        <a href="#" class="portfolio-card placeholder">
            <div class="placeholder-inner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                <span>Coming Soon</span>
            </div>
        </a>

        <a href="#" class="portfolio-card placeholder">
            <div class="placeholder-inner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                <span>Coming Soon</span>
            </div>
        </a>

    </div>

</div>

</body>
</html>
